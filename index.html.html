<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate of Appreciation</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&amp;family=Poppins:wght@600;700&amp;display=swap" rel="stylesheet">
  <style>
  html, body { height: 100%; margin: 0; overflow: auto; }
  .cert-wrapper { perspective: 1200px; }
  .cert-card {
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.23, 1, 0.320, 1), box-shadow 0.3s ease;
  }
  .cert-card:hover {
    box-shadow: 0 30px 80px rgba(204, 0, 9, 0.5);
  }
  .gold-border {
    background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(212, 175, 55, 0.15));
    backdrop-filter: blur(12px);
    padding: 4px;
    border-radius: 12px;
    border: 1px solid rgba(255, 215, 0, 0.3);
  }
  .inner-border {
    border: 2px solid rgba(255, 215, 0, 0.4);
    border-radius: 8px;
    position: relative;
    overflow: hidden;
    background: rgba(0, 0, 0, 0.2);
    backdrop-filter: blur(8px);
  }
  .inner-border::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(255, 215, 0, 0.25);
    border-radius: 6px;
    pointer-events: none;
  }
  .confetti-piece {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    will-change: transform, opacity;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-10px) rotate(0deg) scale(1); opacity: 1; }
    80% { opacity: 1; }
    100% { transform: translateY(110%) rotate(var(--rot)) scale(0.5); opacity: 0; }
  }
  @keyframes confettiExplode {
    0% { 
      transform: translate(0, 0) rotate(0deg) scale(1);
      opacity: 1;
    }
    100% { 
      transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(0);
      opacity: 0;
    }
  }
  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  .shimmer-text {
    background: linear-gradient(90deg, #FFD700 0%, #FFFFFF 25%, #FFD700 50%, #FFFFFF 75%, #FFD700 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s linear infinite;
  }
  @keyframes goldGlow {
    0%, 100% { text-shadow: 0 0 10px #D4AF37, 0 0 20px #FFD700, 0 0 30px rgba(212, 175, 55, 0.5); }
    50% { text-shadow: 0 0 20px #D4AF37, 0 0 40px #FFD700, 0 0 50px rgba(212, 175, 55, 0.8); }
  }
  .gold-shine-name {
    background: linear-gradient(90deg, #FFD700 0%, #D4AF37 50%, #FFD700 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: goldGlow 2s ease-in-out infinite, shimmer 3s linear infinite;
    font-weight: 700;
    letter-spacing: 0.05rem;
    cursor: pointer;
    transition: transform 0.3s ease;
    display: inline-block;
    padding: 0 8px;
  }
  .gold-shine-name:hover {
    transform: scale(1.15);
    filter: drop-shadow(0 0 12px rgba(255, 215, 0, 0.8));
  }
  .campaign-btn {
    background: linear-gradient(135deg, rgba(255, 215, 0, 0.25) 0%, rgba(255, 165, 0, 0.2) 100%);
    backdrop-filter: blur(15px);
    border: 2px solid rgba(255, 215, 0, 0.6);
    color: #FFD700;
    padding: 8px 16px;
    border-radius: 6px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 0.08rem;
    display: inline-block;
    box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2);
  }
  .campaign-btn:hover {
    transform: scale(1.1) translateY(-2px);
    background: linear-gradient(135deg, rgba(255, 215, 0, 0.4) 0%, rgba(255, 165, 0, 0.35) 100%);
    border: 2px solid rgba(255, 215, 0, 0.8);
    box-shadow: 0 8px 25px rgba(255, 215, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.3);
    filter: drop-shadow(0 0 12px rgba(255, 215, 0, 0.9));
  }
  .campaign-btn:active {
    transform: scale(0.98);
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeInUp 0.8s ease forwards; opacity: 0; }
  .fade-in-1 { animation-delay: 0.2s; }
  .fade-in-2 { animation-delay: 0.5s; }
  .fade-in-3 { animation-delay: 0.8s; }
  .fade-in-4 { animation-delay: 1.1s; }
  .fade-in-5 { animation-delay: 1.4s; }
  .ornament { color: #FFD700; font-size: 1.5rem; letter-spacing: 0.5rem; }
  body { font-family: 'Roboto', sans-serif; box-sizing: border-box; }
  .cert-title { font-family: 'Poppins', sans-serif; font-weight: 700; }
  .cert-name { font-family: 'Roboto', sans-serif; font-weight: 500; }
  .names-container {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  .name-frame {
    background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(212, 175, 55, 0.15));
    backdrop-filter: blur(12px);
    padding: 8px 16px;
    border-radius: 8px;
    border: 2px solid rgba(255, 215, 0, 0.4);
    position: relative;
    box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.15);
    transition: all 0.3s ease;
  }
  .name-frame::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(255, 215, 0, 0.2);
    border-radius: 4px;
    pointer-events: none;
  }
  .name-frame:hover {
    background: linear-gradient(135deg, rgba(255, 215, 0, 0.35), rgba(212, 175, 55, 0.25));
    border: 2px solid rgba(255, 215, 0, 0.6);
    box-shadow: 0 8px 25px rgba(255, 215, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
    transform: scale(1.08);
  }
  </style>

 <body class="h-full" style="background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);">
  <div id="app" class="h-full w-full flex items-center justify-center p-4 sm:p-8" style="min-height: 100%; aspect-ratio: auto;">
   <div class="cert-wrapper" style="width: 100%; max-width: 800px; aspect-ratio: 16 / 10;">
    <div class="cert-card gold-border" id="certCard" style="width: 100%; height: 100%;">
     <div class="inner-border p-6 sm:p-8" style="background: linear-gradient(160deg, #CC0009 0%, #8B0007 100%); width: 100%; height: 100%; display: flex; flex-direction: column; backdrop-filter: blur(20px); border: 2px solid rgba(255, 215, 0, 0.2);">
      <!-- Top ornament -->
      <div class="text-center fade-in fade-in-1 flex-shrink-0">
       <div class="ornament">
        ✦ ✦ ✦
       </div>
       <div class="flex justify-center my-3">
        <svg width="200" height="2"><rect width="200" height="2" fill="#ffffff" />
        </svg>
       </div>
      </div><!-- Certificate Title -->
      <div class="text-center fade-in fade-in-2 flex-shrink-0 mt-2">
       <div class="cert-title text-3xl sm:text-4xl text-white" style="letter-spacing: 0.15rem; font-weight: 800;">
        HEROES
       </div><button class="campaign-btn fade-in fade-in-3 mt-3" onclick="triggerConfetti(event)"> FREECLIP2 CAMPAIGN </button>
      </div><!-- Message -->
      <div class="text-center fade-in fade-in-3 flex-1 flex items-center justify-center my-3">
       <div class="text-white text-xs sm:text-sm leading-relaxed" style="opacity: 0.95; font-weight: 300;">
        <div class="mb-4">
         We deeply appreciate your exceptional contributions to the Freeclip2 campaign
        </div>
        <div class="names-container">
         <div class="name-frame">
          <span class="text-base sm:text-lg gold-shine-name">★ AHMED AYMAN ★</span>
         </div>
         <div class="name-frame">
          <span class="text-base sm:text-lg gold-shine-name">★ LIZHE ★</span>
         </div>
         <div class="name-frame">
          <span class="text-base sm:text-lg gold-shine-name">★ MOHAMED SAMI ★</span>
         </div>
        </div>
       </div>
      </div><!-- Bottom ornament -->
      <div class="text-center fade-in fade-in-5 flex-shrink-0">
       <div class="flex justify-center my-2">
        <svg width="200" height="2"><rect width="200" height="2" fill="#ffffff" />
        </svg>
       </div>
       <div class="ornament">
        ✦ ✦ ✦
       </div>
       <div class="shimmer-text text-sm mt-3 font-semibold" style="letter-spacing: 0.08rem;">
        WITH APPRECIATION
       </div>
       <div class="shimmer-text text-sm font-bold" style="letter-spacing: 0.1rem;">
        THE WHOLE TEAM
       </div>
      </div>
     </div>
    </div>
   </div>
  </div>
  <script>
    lucide.createIcons();
    
    const certCard = document.getElementById('certCard');
    const certWrapper = document.querySelector('.cert-wrapper');
    
    // 360-degree tilt based on mouse position
    certWrapper.addEventListener('mousemove', (e) => {
      const rect = certWrapper.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      
      const mouseX = e.clientX - centerX;
      const mouseY = e.clientY - centerY;
      
      const rotationX = (mouseY / (rect.height / 2)) * 15;
      const rotationY = (mouseX / (rect.width / 2)) * 15;
      
      certCard.style.transform = `rotateX(${-rotationX}deg) rotateY(${rotationY}deg) scale(1.02)`;
    });
    
    // Reset tilt on mouse leave
    certWrapper.addEventListener('mouseleave', () => {
      certCard.style.transform = 'rotateX(0deg) rotateY(0deg) scale(1)';
    });
    
    // Click-based directional tilt
    certCard.addEventListener('click', (e) => {
      const rect = certCard.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      
      const clickX = e.clientX - centerX;
      const clickY = e.clientY - centerY;
      
      // Determine which side was clicked
      const isLeft = clickX < 0;
      const isRight = clickX > 0;
      const isTop = clickY < 0;
      
      // Apply dramatic tilt based on click position
      let rotX, rotY, rotZ;
      
      if (isLeft && isTop) {
        // Top-left: tilt up-left
        rotX = -20;
        rotY = -25;
        rotZ = -5;
      } else if (isRight && isTop) {
        // Top-right: tilt up-right
        rotX = -20;
        rotY = 25;
        rotZ = 5;
      } else if (isLeft) {
        // Bottom-left: tilt down-left
        rotX = 15;
        rotY = -20;
        rotZ = -3;
      } else {
        // Bottom-right: tilt down-right
        rotX = 15;
        rotY = 20;
        rotZ = 3;
      }
      
      certCard.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) rotateZ(${rotZ}deg) scale(1.05)`;
      
      // Return to normal after 600ms
      setTimeout(() => {
        certCard.style.transform = 'rotateX(0deg) rotateY(0deg) rotateZ(0deg) scale(1)';
      }, 600);
      
      triggerConfetti(e);
    });
    
    // Massive confetti explosion
    function createConfetti() {
      const confettiCount = 150;
      const certCard = document.getElementById('certCard');
      const rect = certCard.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      
      const colors = ['#FF0A16', '#FF6B5B', '#E60012', '#FF8A73', '#FFD700', '#FFA500', '#ffffff'];
      
      for (let i = 0; i < confettiCount; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        const angle = (Math.PI * 2 * i) / confettiCount;
        const velocity = 8 + Math.random() * 12;
        const tx = Math.cos(angle) * velocity * 80;
        const ty = Math.sin(angle) * velocity * 80;
        const rot = Math.random() * 720;
        
        piece.style.left = centerX + 'px';
        piece.style.top = centerY + 'px';
        piece.style.width = '12px';
        piece.style.height = '12px';
        piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px';
        piece.style.setProperty('--tx', tx + 'px');
        piece.style.setProperty('--ty', ty + 'px');
        piece.style.setProperty('--rot', rot + 'deg');
        piece.style.animation = `confettiExplode ${2 + Math.random() * 1}s ease-out forwards`;
        
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 3500);
      }
    }
    
    function triggerConfetti(event) {
      event.preventDefault();
      createConfetti();
    }
    
    // Trigger confetti on hover
    let confettiTriggered = false;
    certWrapper.addEventListener('mouseenter', () => {
      if (!confettiTriggered) {
        confettiTriggered = true;
        createConfetti();
        setTimeout(() => {
          confettiTriggered = false;
        }, 4000);
      }
    });

    // Trigger confetti on click anywhere
    document.addEventListener('click', () => {
      createConfetti();
    });
    
    // Element SDK initialization
    const defaultConfig = {};
    const config = { ...defaultConfig };

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (updatedConfig) => {
        Object.assign(config, updatedConfig);
      },
      mapToCapabilities: () => ({
        recolorables: [],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      }),
      mapToEditPanelValues: () => new Map()
    });
  </script>
